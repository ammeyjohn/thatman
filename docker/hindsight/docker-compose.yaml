services:
  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    container_name: hindsight
    pull_policy: always
    restart: unless-stopped
    ports:
      - "8888:8888"
      - "9999:9999"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      HINDSIGHT_API_LLM_PROVIDER: openai
      HINDSIGHT_API_LLM_MODEL: Qwen3.6-27B-MTP-Q4
      HINDSIGHT_API_LLM_BASE_URL: http://host.docker.internal:7779/v1
      # HINDSIGHT_API_LLM_BASE_URL: http://128.1.1.48:7778/v1
      HINDSIGHT_API_LLM_API_KEY: dummy
      HF_ENDPOINT: https://hf-mirror.com
      HF_HOME: /home/hindsight/.cache/huggingface
      HINDSIGHT_HF_CACHE: /home/hindsight/.cache/huggingface
      HINDSIGHT_API_EMBEDDINGS_PROVIDER: local
      HINDSIGHT_API_EMBEDDINGS_MODEL_NAME: Qwen/Qwen3-Embedding-0.6B
      HINDSIGHT_API_RERANK_PROVIDER: local
      HINDSIGHT_API_RERANK_MODEL_NAME: Qwen/Qwen3-Rerank-0.6B
    volumes:
      - ./data:/home/hindsight/.pg0
      - ./hf_cache:/home/hindsight/.cache/huggingface
