# Flask 服务配置
flask:
  env: development
  port: 8080
  debug: true

# LLM 配置 - 聊天代理模型
llm:
  api_base: http://localhost:7778/v1
  api_key: not-needed
  model_name: Qwen3.6-27B-UD-Q4_K_XL
  # 平衡随机性与逻辑性，保证世界演化有变化、无荒诞剧情
  temperature: 0.65
  # 约束输出方向，贴合修仙世界观，避免内容跑偏
  top_p: 0.85
  # 覆盖剧情、结构化JSON、UI配置完整输出，防止截断
  max_tokens: 8192
  # 减少重复剧情与事件，保证演化层层递进
  frequency_penalty: 0.1
  # 鼓励新生内容，支撑世界持续自演化
  presence_penalty: 0.2
  # 强制结构化输出，适配后端解析与数据库存储
  response_format:
    type: json_object

# GM 聊天模型（常驻，用于玩家聊天）
chat_model:
  api_base: http://localhost:7778/v1
  api_key: not-needed
  model_name: Qwen3.6-35B-A3B
  temperature: 0.65
  max_tokens: 4096

# GM 世界演化模型（按需启动，用完释放）
world_model:
  api_base: http://localhost:7779/v1
  api_key: not-needed
  model_name: Qwen3.6-27B-MTP
  temperature: 0.7
  max_tokens: 8192

# 布局生成模型（Qwen3-Coder-Next-Q4，用于动态生成面板布局）
layout_model:
  api_base: http://localhost:7777/v1
  api_key: not-needed
  model_name: Qwen3-Coder-Next-Q4
  temperature: 0.3
  max_tokens: 4096

# CouchDB 配置
couchdb:
  url: http://localhost:5984
  db_prefix: thatman_
  user: admin
  password: Admin@123456

# Qdrant 配置
qdrant:
  url: http://localhost:6333
  collection: episode

# Hindsight 记忆库配置
hindsight:
  base_url: http://localhost:9998
  api_key: null
  # 世界 bank 名称，用于存储世界演化相关的长期记忆
  world_bank: world

# GM 游戏主控配置
gm:
  # 调试模式开关，关闭后不输出 debug 级别日志
  debug: true
  # 世界演化配置
  world_tick:
    interval_seconds: 3600
    prompt: "请根据当前世界状态，推演世界变化。包括：宗门兴衰、NPC增减、秘境刷新、法宝出世、天灾与奇遇事件。输出标准JSON格式，save_flag设为world_snap。"
